<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Student Registration Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#1e293b);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:400px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#0f172a;
        }

        .input-box{
            margin-bottom:15px;
        }

        label{
            font-weight:bold;
            display:block;
            margin-bottom:5px;
        }

        input, select, textarea{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
        }

        textarea{
            resize:none;
            height:80px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            background:#2563eb;
            color:white;
            font-size:16px;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
        }
    </style>
</head>
<body>

    <div class="container">

        <h2>Registration Form</h2>

        <!-- IMPORTANT -->
        <!-- action="" ដាក់ link backend -->

        <form action="save.php" method="POST">

            <div class="input-box">
                <label>Full Name</label>
                <input type="text" name="fullname" required>
            </div>

            <div class="input-box">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <div class="input-box">
                <label>Gender</label>
                <select name="gender">
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>

            <div class="input-box">
                <label>Address</label>
                <textarea name="address"></textarea>
            </div>

            <button type="submit">Submit</button>

        </form>

    </div>

</body>
</html>
